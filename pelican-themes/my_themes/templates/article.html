{% extends "base.html" %}
```html
{% block head %}
  {{ super() }}
  <meta name="description" content="{{ article.summary|striptags|truncate(150) }}">
  <meta property="og:title" content="{{ article.title }} - Ozan Baran">
  <meta property="og:description" content="{{ article.summary|striptags|truncate(150) }}">
  <meta property="og:url" content="{{ SITEURL }}/{{ article.url }}">
{% endblock %}

{% block content %}
<article class="py-20 mx-auto {% if article.category|string == 'Projeler' %} w-full max-w-7xl px-4 {% else %} max-w-3xl px-6 {% endif %}">
    <header class="mb-12">
        <h1 class="text-4xl md:text-5xl font-bold mb-4 text-white">{{ article.title }}</h1>
        <div class="text-gray-500 text-sm italic">
            {{ article.locale_date }} — Kategori: <span class="neon-green">{{ article.category }}</span>
        </div>
    </header>

    <div class="prose prose-invert prose-emerald max-w-none text-gray-300 leading-loose w-full">
        {{ article.content }}
    </div>
</article>
{% endblock %}
